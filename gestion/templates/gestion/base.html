<!-- templates/gestion/base.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Restaurante Pasta La Vista</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'gestion/css/estilos.css' %}">
</head>
<body>
    <header>
        <h1>Sistema de Gestión de Pedidos - Pasta La Vista</h1>
    </header>

    <nav>
        <a href="{% url 'inicio' %}">Inicio</a>
        <a href="{% url 'clientes' %}">Clientes</a>
        <a href="{% url 'lista_empleados' %}">Empleados</a>
        <a href="{% url 'lista_mesas' %}">Mesas</a>
        <a href="{% url 'lista_platos' %}">Platos</a>
        <a href="{% url 'lista_ordenes' %}">Órdenes</a>
        <a href="{% url 'lista_facturas' %}">Facturas</a>
        <span class="nav-user">{{ user.get_username }}</span>
        <form class="nav-logout" method="post" action="{% url 'salir' %}">
            {% csrf_token %}
            <button type="submit" class="nav-logout-btn">Cerrar sesión</button>
        </form>
    </nav>

    <div class="contenedor">
        {% if messages %}
            <ul class="messages">
                {% for message in messages %}
                    <li class="message message-{{ message.tags }}">{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
